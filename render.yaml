services:
  # 1. Quadis Hotels Backend API Server (Node/Express/PostgreSQL)
  - type: web
    name: quadis-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: in-memory # Set to real cloud PostgreSQL or Supabase connection string
      - key: RAZORPAY_KEY_ID
        value: rzp_test_simulated_key
      - key: RAZORPAY_KEY_SECRET
        value: simulated_secret_key
      - key: RAZORPAY_WEBHOOK_SECRET
        value: simulated_webhook_secret
      - key: OWNER_WHATSAPP_PHONE
        value: "+919217373532"
      - key: GROQ_API_KEY
        value: dummy_groq_key # Set to real Groq Llama-3.3 key for production LLM
      - key: ADMIN_PIN
        value: "998877"

  # 2. Quadis Hotels Frontend Static SPA (Vite + React + Vanilla CSS)
  - type: web
    name: quadis-frontend
    env: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
